aid: amazon-parallel-computing-service
name: Amazon Parallel Computing Service
description: >-
  AWS Parallel Computing Service (PCS) is a managed service that makes it
  easy to create and manage high performance computing (HPC) clusters on AWS.
  It provides familiar scheduler interfaces, integrates with existing HPC
  tools, and scales automatically to handle demanding workloads.
