naftiko: 1.0.0-alpha1
info:
  label: Amazon Parallel Computing Service API Workflow
  description: Workflow capability composing Amazon Parallel Computing Service APIs for developers and operators.
  tags:
  - Amazon Parallel Computing Service
  - AWS
  created: '2026-04-19'
  modified: '2026-04-19'
binds:
- namespace: env
  keys:
    AWS_SIGV4_AUTH: AWS_SIGV4_AUTH
capability:
  consumes:
  - import: pcs
    location: ./shared/pcs.yaml
  exposes:
  - type: rest
    port: 8080
    namespace: amazon-parallel-computing-service-api
    description: Unified REST API for Amazon Parallel Computing Service.
    resources:
    - path: /v1/resources
      name: resources
      description: Primary Amazon Parallel Computing Service resources
      operations:
      - method: GET
        name: list-resources
        description: List Amazon Parallel Computing Service resources
        call: openapi.yml.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: amazon-parallel-computing-service-mcp
    transport: http
    description: MCP server for AI-assisted Amazon Parallel Computing Service operations.
    tools:
    - name: list-openapi.yml
      description: List and manage openapi.yml resources
      hints:
        readOnly: true
        openWorld: true
      call: openapi.yml.list
      outputParameters:
      - type: object
        mapping: $.
